name: SEO (reusable)

on:
  workflow_call:
    secrets:
      # Option A: 1Password (ANTHROPIC_API_KEY + SERPAPI_KEY werden aus 1Password geladen)
      OP_SERVICE_ACCOUNT_TOKEN:
        required: false
      # Option B: Direkte Secrets (wenn kein 1Password vorhanden)
      ANTHROPIC_API_KEY:
        required: false
      SERPAPI_KEY:
        required: false
      # Immer projektspezifisch:
      GSC_CREDENTIALS:
        required: true
      GSC_TOKEN:
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    env:
      HAVE_OP_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Load shared secrets from 1Password
        if: env.HAVE_OP_TOKEN == 'true'
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_API_KEY: op://development/seo-cli/ANTHROPIC_API_KEY
          SERPAPI_KEY: op://development/seo-cli/SERPAPI_KEY

      - name: Use direct secrets (no 1Password)
        if: env.HAVE_OP_TOKEN != 'true'
        env:
          DIRECT_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DIRECT_SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          {
            echo "ANTHROPIC_API_KEY<<SECRET_EOF"
            printf '%s\n' "$DIRECT_ANTHROPIC_API_KEY"
            echo "SECRET_EOF"
            echo "SERPAPI_KEY<<SECRET_EOF"
            printf '%s\n' "$DIRECT_SERPAPI_KEY"
            echo "SECRET_EOF"
          } >> "$GITHUB_ENV"

      - name: Checkout seo-cli
        uses: actions/checkout@v4
        with:
          repository: raaaf/seo-cli
          path: .seo-cli

      - name: Install seo-cli dependencies
        run: npm ci
        working-directory: .seo-cli

      - name: Write Google credentials
        env:
          GSC_CREDENTIALS: ${{ secrets.GSC_CREDENTIALS }}
          GSC_TOKEN: ${{ secrets.GSC_TOKEN }}
        run: |
          umask 077
          printf '%s' "$GSC_CREDENTIALS" > /tmp/gsc-credentials.json
          printf '%s' "$GSC_TOKEN" > "$HOME/.seo-cli-token.json"

      - name: Run seo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gsc-credentials.json
        run: node .seo-cli/bin/seo.js run

      - name: Report PR URL
        run: |
          PR_URL=$(node -e "
            try {
              const fs = require('fs');
              const f = JSON.parse(fs.readFileSync('./seo/last-pr.json', 'utf8'));
              console.log(f.pr_url || '');
            } catch { console.log(''); }
          " 2>/dev/null || echo "")
          if [ -n "$PR_URL" ]; then
            echo "PR ready for review: $PR_URL"
          else
            echo "No new PR this run"
          fi

      - name: Clean up credentials
        if: always()
        run: |
          rm -f /tmp/gsc-credentials.json
          rm -f "$HOME/.seo-cli-token.json"
