name: SEO (reusable)

on:
  workflow_call:
    secrets:
      # Option A: 1Password (ANTHROPIC_API_KEY + SERPAPI_KEY werden aus 1Password geladen)
      OP_SERVICE_ACCOUNT_TOKEN:
        required: false
      # Option B: Direkte Secrets (wenn kein 1Password vorhanden)
      ANTHROPIC_API_KEY:
        required: false
      SERPAPI_KEY:
        required: false
      # Immer projektspezifisch:
      GSC_CREDENTIALS:
        required: true
      GSC_TOKEN:
        required: true
      # Optional: n8n-Webhook-URL fuer E-Mail-Benachrichtigung (merged / needs review)
      SEO_NOTIFY_WEBHOOK:
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    env:
      HAVE_OP_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Load shared secrets from 1Password
        if: env.HAVE_OP_TOKEN == 'true'
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_API_KEY: op://development/seo-cli/ANTHROPIC_API_KEY
          SERPAPI_KEY: op://development/seo-cli/SERPAPI_KEY

      - name: Use direct secrets (no 1Password)
        if: env.HAVE_OP_TOKEN != 'true'
        env:
          DIRECT_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DIRECT_SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          {
            echo "ANTHROPIC_API_KEY<<SECRET_EOF"
            printf '%s\n' "$DIRECT_ANTHROPIC_API_KEY"
            echo "SECRET_EOF"
            echo "SERPAPI_KEY<<SECRET_EOF"
            printf '%s\n' "$DIRECT_SERPAPI_KEY"
            echo "SECRET_EOF"
          } >> "$GITHUB_ENV"

      - name: Checkout seo-cli
        uses: actions/checkout@v4
        with:
          repository: raaaf/seo-cli
          path: .seo-cli

      - name: Install seo-cli dependencies
        run: npm ci
        working-directory: .seo-cli

      - name: Write Google credentials
        env:
          GSC_CREDENTIALS: ${{ secrets.GSC_CREDENTIALS }}
          GSC_TOKEN: ${{ secrets.GSC_TOKEN }}
        run: |
          umask 077
          printf '%s' "$GSC_CREDENTIALS" > /tmp/gsc-credentials.json
          printf '%s' "$GSC_TOKEN" > "$HOME/.seo-cli-token.json"

      - name: Run seo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gsc-credentials.json
        run: node .seo-cli/bin/seo.js run

      - name: Gate — validate, auto-merge, notify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTIFY_WEBHOOK: ${{ secrets.SEO_NOTIFY_WEBHOOK }}
        run: |
          set -uo pipefail

          PR_URL=$(node -e "
            try {
              const fs = require('fs');
              const f = JSON.parse(fs.readFileSync('./seo/last-pr.json', 'utf8'));
              console.log(f.pr_url || '');
            } catch { console.log(''); }
          " 2>/dev/null || echo "")

          if [ -z "$PR_URL" ]; then
            echo "No new PR this run — nothing to gate."
            exit 0
          fi

          PR_NUM="${PR_URL##*/}"
          echo "Gating PR #$PR_NUM ($PR_URL)"

          # Changed markdown files in the PR
          mapfile -t MD < <(gh pr view "$PR_NUM" --json files -q '.files[].path' | grep -E '\.md$' || true)
          if [ ${#MD[@]} -eq 0 ]; then
            echo "PR has no markdown pages — skipping gate."
            exit 0
          fi

          # Check out the PR branch so its pages + seo/keywords.json are present
          gh pr checkout "$PR_NUM"

          node .seo-cli/bin/seo.js check "${MD[@]}" | tee /tmp/seo-check.out
          CHECK_EXIT=${PIPESTATUS[0]}

          REPORT=$(grep -o 'SEO_CHECK_JSON=.*' /tmp/seo-check.out | sed 's/^SEO_CHECK_JSON=//' | tail -1)
          [ -z "$REPORT" ] && REPORT='{}'

          if [ "$CHECK_EXIT" -eq 0 ]; then
            if gh pr merge "$PR_NUM" --squash --delete-branch; then
              STATUS=merged
            else
              STATUS=merge_failed
            fi
          else
            STATUS=needs_review
          fi
          echo "Gate result: $STATUS"

          if [ -n "${NOTIFY_WEBHOOK:-}" ]; then
            jq -n \
              --arg repo "${GITHUB_REPOSITORY}" \
              --arg status "$STATUS" \
              --arg pr_url "$PR_URL" \
              --arg run_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              --argjson report "$REPORT" \
              '{repo:$repo, status:$status, pr_url:$pr_url, run_url:$run_url, files:($report.pages // [] | map(.file)), report:$report}' \
              | curl -sS -X POST -H 'Content-Type: application/json' -d @- "$NOTIFY_WEBHOOK" \
              || echo "Notify webhook call failed (non-fatal)."
          else
            echo "No SEO_NOTIFY_WEBHOOK configured — skipping email notification."
          fi

      - name: Clean up credentials
        if: always()
        run: |
          rm -f /tmp/gsc-credentials.json
          rm -f "$HOME/.seo-cli-token.json"
